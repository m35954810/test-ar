<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CET141 – Database Quiz | Lab #2</title>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Cairo:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f1a;
            --surface: #141726;
            --card: #1b1f33;
            --border: #272c45;
            --accent: #00e5ff;
            --accent2: #7c3aed;
            --success: #22c55e;
            --error: #ef4444;
            --warn: #f59e0b;
            --text: #e2e8f0;
            --muted: #8892a4;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'Cairo', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(0, 229, 255, .03)1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 255, .03)1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13, 15, 26, .9);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            padding: 10px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .topbar-title {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--accent);
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .topbar-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .tb-btn {
            background: var(--surface);
            border: 1.5px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: 7px 14px;
            cursor: pointer;
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .5px;
            transition: all .2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tb-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .tb-btn.lang {
            background: linear-gradient(135deg, rgba(124, 58, 237, .15), rgba(0, 229, 255, .08));
            border-color: rgba(0, 229, 255, .3);
            color: var(--accent);
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
            padding: 34px 20px 80px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 38px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent2), #4f46e5);
            color: #fff;
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 2px;
            padding: 5px 14px;
            border-radius: 2px;
            text-transform: uppercase;
            margin-bottom: 13px;
        }

        header h1 {
            font-size: clamp(1.7rem, 5vw, 2.5rem);
            font-weight: 800;
            line-height: 1.2;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        header p {
            color: var(--muted);
            font-family: var(--mono);
            font-size: 12px;
        }

        .progress-label {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 7px;
        }

        .progress-wrap {
            background: var(--border);
            border-radius: 99px;
            height: 6px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent2), var(--accent));
            border-radius: 99px;
            transition: width .5s cubic-bezier(.4, 0, .2, 1);
            width: 0%;
        }

        .section-title {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent2);
            margin: 34px 0 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Card ── */
        .question-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 16px;
            overflow: hidden;
            transition: border-color .3s;
            animation: slideIn .4s ease both;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(16px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .question-card.correct {
            border-color: var(--success);
        }

        .question-card.wrong {
            border-color: var(--error);
        }

        /* ── Accordion header ── */
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 22px;
            cursor: pointer;
            user-select: none;
            transition: background .2s;
            position: relative;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent2), var(--accent));
            border-radius: 99px 0 0 99px;
        }

        [dir="ltr"] .card-header::before {
            left: auto;
            right: 0;
            border-radius: 0 99px 99px 0;
        }

        .card-header:hover {
            background: rgba(255, 255, 255, .025);
        }

        .q-num {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--accent);
            background: rgba(0, 229, 255, .08);
            padding: 3px 10px;
            border-radius: 99px;
            border: 1px solid rgba(0, 229, 255, .2);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .q-type-badge {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        .q-preview {
            flex: 1;
            font-size: .9rem;
            font-weight: 600;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chevron {
            font-size: .75rem;
            color: var(--muted);
            transition: transform .3s;
            flex-shrink: 0;
            margin-right: 0;
        }

        .card-header.collapsed .chevron {
            transform: rotate(-90deg);
        }

        /* ── Card body ── */
        .card-body {
            padding: 0 22px 22px;
            border-top: 1px solid var(--border);
        }

        .card-body.hidden {
            display: none;
        }

        .question-full {
            font-size: .98rem;
            font-weight: 600;
            line-height: 1.8;
            padding: 16px 0;
            color: var(--text);
        }

        code.inline {
            background: rgba(0, 229, 255, .1);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: var(--mono);
            color: var(--accent);
            font-size: .82em;
        }

        /* ── Options ── */
        .options {
            display: flex;
            flex-direction: column;
            gap: 9px;
        }

        .option {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 12px 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all .2s;
            font-size: .92rem;
        }

        .option:hover:not(.disabled) {
            border-color: var(--accent);
            background: rgba(0, 229, 255, .04);
            transform: translateX(-3px);
        }

        [dir="ltr"] .option:hover:not(.disabled) {
            transform: translateX(3px);
        }

        .opt-letter {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            background: rgba(0, 229, 255, .1);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all .2s;
        }

        .option.selected {
            border-color: var(--accent);
            background: rgba(0, 229, 255, .06);
        }

        .option.correct-ans {
            border-color: var(--success);
            background: rgba(34, 197, 94, .08);
        }

        .option.correct-ans .opt-letter {
            background: var(--success);
            color: #fff;
        }

        .option.wrong-ans {
            border-color: var(--error);
            background: rgba(239, 68, 68, .08);
        }

        .option.wrong-ans .opt-letter {
            background: var(--error);
            color: #fff;
        }

        .option.disabled {
            cursor: default;
        }

        /* ── Action row ── */
        .action-row {
            display: flex;
            gap: 9px;
            margin-top: 14px;
            flex-wrap: wrap;
            align-items: center;
        }

        .check-btn {
            background: linear-gradient(135deg, var(--accent2), #4f46e5);
            color: #fff;
            border: none;
            padding: 9px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--sans);
            font-weight: 700;
            font-size: .86rem;
            transition: opacity .2s, transform .1s;
        }

        .check-btn:hover {
            opacity: .9;
            transform: translateY(-1px);
        }

        .show-ans-btn {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--muted);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: .5px;
            transition: all .2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .show-ans-btn:hover {
            border-color: var(--warn);
            color: var(--warn);
        }

        .show-ans-btn.active {
            border-color: var(--warn);
            color: var(--warn);
            background: rgba(245, 158, 11, .07);
        }

        /* ── Short answer ── */
        .short-answer-wrap textarea {
            width: 100%;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: var(--sans);
            font-size: .93rem;
            padding: 12px 14px;
            resize: vertical;
            min-height: 86px;
            transition: border-color .2s;
            outline: none;
            line-height: 1.75;
            direction: inherit;
        }

        .short-answer-wrap textarea:focus {
            border-color: var(--accent);
        }

        .short-answer-wrap textarea::placeholder {
            color: var(--muted);
        }

        /* ── Feedback ── */
        .feedback {
            margin-top: 13px;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: .87rem;
            line-height: 1.75;
            display: none;
            animation: fadeIn .3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct-fb {
            background: rgba(34, 197, 94, .1);
            border: 1px solid rgba(34, 197, 94, .3);
            color: #4ade80;
        }

        .feedback.wrong-fb {
            background: rgba(239, 68, 68, .1);
            border: 1px solid rgba(239, 68, 68, .3);
            color: #f87171;
        }

        .feedback.info-fb {
            background: rgba(245, 158, 11, .1);
            border: 1px solid rgba(245, 158, 11, .3);
            color: #fbbf24;
        }

        .feedback pre {
            white-space: pre-wrap;
            margin-top: 8px;
            font-family: var(--mono);
            font-size: .77rem;
            color: #94a3b8;
            direction: ltr;
            text-align: left;
        }

        /* ── Submit ── */
        #submit-all {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            color: #fff;
            border: none;
            padding: 17px;
            border-radius: 12px;
            cursor: pointer;
            font-family: var(--sans);
            font-weight: 800;
            font-size: 1.05rem;
            margin-top: 10px;
            transition: opacity .2s, transform .15s;
            letter-spacing: .5px;
        }

        #submit-all:hover {
            opacity: .9;
            transform: translateY(-2px);
        }

        /* ── Score ── */
        #score-card {
            display: none;
            text-align: center;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 32px;
            margin-top: 28px;
            animation: slideIn .5s ease;
        }

        .score-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: conic-gradient(var(--accent) 0%, var(--accent2) var(--pct, 0%), var(--border) var(--pct, 0%));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 22px;
            position: relative;
        }

        .score-circle::after {
            content: '';
            position: absolute;
            inset: 10px;
            background: var(--card);
            border-radius: 50%;
        }

        .score-num {
            position: relative;
            z-index: 1;
            font-family: var(--mono);
            font-size: 2rem;
            font-weight: 600;
            color: var(--accent);
        }

        .score-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .score-sub {
            color: var(--muted);
            font-size: .92rem;
            margin-bottom: 26px;
        }

        .restart-btn {
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: #fff;
            border: none;
            padding: 14px 36px;
            border-radius: 10px;
            cursor: pointer;
            font-family: var(--sans);
            font-weight: 700;
            font-size: .97rem;
            transition: opacity .2s;
        }

        .restart-btn:hover {
            opacity: .85;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <span class="topbar-title">CET141 · LAB #2</span>
        <div class="topbar-actions">
            <button class="tb-btn" id="collapse-btn" onclick="toggleAll()">📂 <span id="collapse-lbl">إخفاء
                    الكل</span></button>
            <button class="tb-btn lang" onclick="toggleLang()">🌐 <span id="lang-lbl">English</span></button>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="badge" id="hdr-badge">CET141 · Spring 2026</div>
            <h1 id="hdr-h1">اختبار الـ Lab #2</h1>
            <p id="hdr-p">// SQL · DDL · Types of Keys · Select</p>
        </header>

        <div class="progress-label" id="prog-lbl">تم الإجابة على 0 من 12 سؤال</div>
        <div class="progress-wrap">
            <div class="progress-bar" id="prog-bar"></div>
        </div>

        <div id="quiz-body">

            <div class="section-title"><span>🧠</span><span id="sec1">أسئلة اختيار من متعدد</span></div>

            <!-- MCQ 1–9 generated by JS -->
            <div id="mcq-container"></div>

            <div class="section-title"><span>✍️</span><span id="sec2">أسئلة إجابة قصيرة</span></div>
            <div id="short-container"></div>

            <button id="submit-all" onclick="submitAll()">📊 <span id="sub-lbl">عرض النتيجة النهائية</span></button>
        </div>

        <div id="score-card">
            <div class="score-circle" id="sc-circle"><span class="score-num" id="sc-num">0/0</span></div>
            <div class="score-title" id="sc-title">—</div>
            <div class="score-sub" id="sc-sub"></div>
            <button class="restart-btn" onclick="restart()">🔄 <span id="restart-lbl">حاول مرة أخرى</span></button>
        </div>
    </div>

    <script>
        // ════════════════════════════════
        // DATA
        // ════════════════════════════════
        const MCQ = [
            {
                id: 1, correctIdx: 1,
                q: { ar: 'ماذا تعني اختصار SQL؟', en: 'What does SQL stand for?' },
                opts: {
                    ar: ['Simple Query Language', 'Structured Query Language', 'Sequential Query Language', 'Standard Query Language'],
                    en: ['Simple Query Language', 'Structured Query Language', 'Sequential Query Language', 'Standard Query Language']
                }
            },
            {
                id: 2, correctIdx: 2,
                q: { ar: 'أي من الأوامر التالية ينتمي إلى DDL؟', en: 'Which command belongs to DDL?' },
                opts: { ar: ['SELECT', 'INSERT', 'CREATE', 'UPDATE'], en: ['SELECT', 'INSERT', 'CREATE', 'UPDATE'] }
            },
            {
                id: 3, correctIdx: 3,
                q: { ar: 'الـ Primary Key لا يسمح بـ ...', en: 'Primary Key does NOT allow ...' },
                opts: {
                    ar: ['الأرقام فقط', 'الحروف فقط', 'القيم الكبيرة', 'قيم NULL أو المكررة'],
                    en: ['Numbers only', 'Letters only', 'Large values', 'NULL or duplicate values']
                }
            },
            {
                id: 4, correctIdx: 1,
                q: { ar: 'أي نوع من المفاتيح يسمح بقيم NULL؟', en: 'Which key type allows NULL values?' },
                opts: {
                    ar: ['Primary Key', 'Unique Key', 'Foreign Key', 'Composite Key'],
                    en: ['Primary Key', 'Unique Key', 'Foreign Key', 'Composite Key']
                }
            },
            {
                id: 5, correctIdx: 0,
                q: { ar: 'الـ Foreign Key يُستخدم بشكل أساسي لـ ...', en: 'Foreign Key is primarily used to ...' },
                opts: {
                    ar: ['إنشاء علاقة بين جدولين والحفاظ على Referential Integrity', 'تسريع عمليات البحث', 'تعريف فريد لكل سجل', 'زيادة أرقام الأعمدة تلقائياً'],
                    en: ['Create a relationship between two tables & maintain Referential Integrity', 'Speed up search queries', 'Uniquely define each record', 'Auto-increment column values']
                }
            },
            {
                id: 6, correctIdx: 2,
                q: { ar: 'ما الأمر المستخدم لإضافة عمود جديد لجدول موجود؟', en: 'Command to add a new column to an existing table?' },
                opts: {
                    ar: ['CREATE COLUMN', 'INSERT COLUMN', 'ALTER TABLE ... ADD COLUMN', 'UPDATE TABLE ... ADD'],
                    en: ['CREATE COLUMN', 'INSERT COLUMN', 'ALTER TABLE ... ADD COLUMN', 'UPDATE TABLE ... ADD']
                }
            },
            {
                id: 7, correctIdx: 0,
                q: { ar: 'الـ AUTO_INCREMENT يُستخدم عادةً مع ...', en: 'AUTO_INCREMENT is usually used with ...' },
                opts: {
                    ar: ['Primary Key', 'Foreign Key', 'Index Key', 'Unique Key'],
                    en: ['Primary Key', 'Foreign Key', 'Index Key', 'Unique Key']
                }
            },
            {
                id: 8, correctIdx: 1,
                q: { ar: 'الـ Composite Key هو مفتاح يتكون من ...', en: 'A Composite Key is made up of ...' },
                opts: {
                    ar: ['عمود واحد فريد', 'عمودين أو أكثر معاً', 'عمود خارجي من جدول آخر', 'مفتاح يزيد تلقائياً'],
                    en: ['A single unique column', 'Two or more columns combined', 'An external column from another table', 'A key that auto-increments']
                }
            },
            {
                id: 9, correctIdx: 3,
                q: { ar: 'أي من التالي ينتمي إلى DQL؟', en: 'Which belongs to DQL?' },
                opts: { ar: ['INSERT', 'GRANT', 'COMMIT', 'SELECT'], en: ['INSERT', 'GRANT', 'COMMIT', 'SELECT'] }
            },
        ];

        const SHORT = [
            {
                id: 10,
                q: { ar: 'ما الفرق بين DDL و DML؟ اذكر أمثلة على كل منهما.', en: 'What is the difference between DDL and DML? Give examples of each.' },
                keywords: ['ddl', 'dml', 'define', 'manipulate', 'create', 'alter', 'drop', 'select', 'insert', 'update', 'delete'],
                model: {
                    ar: 'DDL (Data Definition Language): يُستخدم لتعريف هيكل قاعدة البيانات.\nأوامره: CREATE – ALTER – DROP – TRUNCATE\n\nDML (Data Manipulation Language): يُستخدم للوصول إلى البيانات وتعديلها.\nأوامره: SELECT – INSERT – UPDATE – DELETE',
                    en: 'DDL (Data Definition Language): Used to define the database structure.\nCommands: CREATE – ALTER – DROP – TRUNCATE\n\nDML (Data Manipulation Language): Used to access and modify data.\nCommands: SELECT – INSERT – UPDATE – DELETE'
                }
            },
            {
                id: 11,
                q: {
                    ar: 'اكتب جملة SQL لإنشاء جدول Students يحتوي على: student_id (Primary Key, Auto Increment), name (varchar 50, Not Null), grade (double).',
                    en: 'Write SQL to create a Students table with: student_id (Primary Key, Auto Increment), name (varchar 50, Not Null), grade (double).'
                },
                keywords: ['create table', 'student_id', 'primary key', 'auto_increment', 'name varchar', 'grade'],
                model: {
                    ar: 'CREATE TABLE Students (\n  student_id INT PRIMARY KEY AUTO_INCREMENT,\n  name VARCHAR(50) NOT NULL,\n  grade DOUBLE\n);',
                    en: 'CREATE TABLE Students (\n  student_id INT PRIMARY KEY AUTO_INCREMENT,\n  name VARCHAR(50) NOT NULL,\n  grade DOUBLE\n);'
                }
            },
            {
                id: 12,
                q: { ar: 'اذكر 4 أنواع من المفاتيح (Keys) مع شرح مختصر لكل منها.', en: 'List 4 types of database Keys with a brief explanation of each.' },
                keywords: ['primary', 'unique', 'foreign', 'composite', 'index', 'auto'],
                model: {
                    ar: '1- Primary Key: معرف فريد لكل سجل، لا يقبل NULL أو تكرار.\n2- Unique Key: يضمن عدم تكرار القيم، لكنه يقبل NULL.\n3- Foreign Key: يربط جدولين معاً ويحافظ على Referential Integrity.\n4- Composite Key: مفتاح من عمودين أو أكثر.',
                    en: '1- Primary Key: Unique identifier for each record. No NULL or duplicates.\n2- Unique Key: Ensures unique values. Allows NULL.\n3- Foreign Key: Links two tables. Maintains Referential Integrity.\n4- Composite Key: Made of two or more columns.'
                }
            },
        ];

        const T = {
            ar: {
                collapseAll: '📂 إخفاء الكل', expandAll: '📂 إظهار الكل', langLbl: 'English',
                sec1: 'أسئلة اختيار من متعدد', sec2: 'أسئلة إجابة قصيرة',
                prog: (d, t) => `تم الإجابة على ${d} من ${t} سؤال`, progDone: 'انتهى الاختبار!',
                showAns: '💡 اعرض الإجابة', hideAns: '💡 إخفاء الإجابة',
                checkBtn: '✔ تحقق', submitBtn: '📊 عرض النتيجة النهائية', restartBtn: '🔄 حاول مرة أخرى',
                correct: '✅ إجابة صحيحة!', wrong: '❌ خطأ — الإجابة الصحيحة باللون الأخضر.',
                tooShort: '⚠️ الإجابة قصيرة جداً.', excellent: '✅ ممتاز!', partial: '🟡 إجابة جزئية.',
                poor: '❌ تحتاج مراجعة.', modelLbl: 'نموذج الإجابة:',
                s90: '🏆 ممتاز!', s75: '🎉 جيد جداً!', s60: '👍 جيد', s40: '📖 يحتاج مراجعة', s0: '💪 لا تستسلم!',
                p90: 'أنت محترف SQL!', p75: 'أداء رائع، استمر!', p60: 'راجع المحتوى مرة أخرى.', p40: 'راجع الـ Lab ثم حاول.', p0: 'اقرأ المادة بتمعن.',
                placeholder: 'اكتب إجابتك هنا...',
            },
            en: {
                collapseAll: '📂 Collapse All', expandAll: '📂 Expand All', langLbl: 'عربي',
                sec1: 'Multiple Choice Questions', sec2: 'Short Answer Questions',
                prog: (d, t) => `Answered ${d} of ${t} questions`, progDone: 'Quiz Finished!',
                showAns: '💡 Show Answer', hideAns: '💡 Hide Answer',
                checkBtn: '✔ Check', submitBtn: '📊 Show Final Result', restartBtn: '🔄 Try Again',
                correct: '✅ Correct!', wrong: '❌ Wrong — correct answer highlighted in green.',
                tooShort: '⚠️ Answer is too short.', excellent: '✅ Excellent!', partial: '🟡 Partial answer.',
                poor: '❌ Needs improvement.', modelLbl: 'Model Answer:',
                s90: '🏆 Excellent!', s75: '🎉 Very Good!', s60: '👍 Good', s40: '📖 Needs Review', s0: '💪 Don\'t give up!',
                p90: 'You\'re an SQL pro!', p75: 'Great job, keep it up!', p60: 'Review the content once more.', p40: 'Revisit the Lab and retry.', p0: 'Study carefully and try again.',
                placeholder: 'Write your answer here...',
            }
        };

        // ════════════════════════════════
        // STATE
        // ════════════════════════════════
        let lang = 'ar';
        let allCollapsed = false;
        let mcqDone = {}, shortDone = {};
        let mcqScore = 0, shortScores = { 10: 0, 11: 0, 12: 0 };
        let revealed = {};
        const TOTAL = 12;

        // ════════════════════════════════
        // BUILD HTML
        // ════════════════════════════════
        function buildQuiz() {
            // MCQ
            const mc = document.getElementById('mcq-container');
            MCQ.forEach((q, i) => {
                mc.innerHTML += `
    <div class="question-card" id="card-${q.id}" style="animation-delay:${.05 + i * .05}s">
      <div class="card-header" onclick="toggleCard(${q.id})">
        <span class="q-num">Q${q.id}</span>
        <span class="q-type-badge">MCQ</span>
        <span class="q-preview" id="prev-${q.id}">${q.q.ar}</span>
        <span class="chevron">▾</span>
      </div>
      <div class="card-body" id="body-${q.id}">
        <div class="question-full" id="qtxt-${q.id}">${q.q.ar}</div>
        <div class="options" id="opts-${q.id}">
          ${q.opts.ar.map((o, j) => `<div class="option" onclick="pick(this,${q.id},${j})"><span class="opt-letter">${'ABCD'[j]}</span><span class="opt-txt">${o}</span></div>`).join('')}
        </div>
        <div class="action-row">
          <button class="show-ans-btn" id="sab-${q.id}" onclick="revealMCQ(${q.id})"><span id="sabtxt-${q.id}">💡 اعرض الإجابة</span></button>
        </div>
        <div class="feedback" id="fb-${q.id}"></div>
      </div>
    </div>`;
            });

            // SHORT
            const sh = document.getElementById('short-container');
            SHORT.forEach((q, i) => {
                sh.innerHTML += `
    <div class="question-card" id="card-${q.id}" style="animation-delay:${.5 + i * .05}s">
      <div class="card-header" onclick="toggleCard(${q.id})">
        <span class="q-num">Q${q.id}</span>
        <span class="q-type-badge">Short Answer</span>
        <span class="q-preview" id="prev-${q.id}">${q.q.ar}</span>
        <span class="chevron">▾</span>
      </div>
      <div class="card-body" id="body-${q.id}">
        <div class="question-full" id="qtxt-${q.id}">${q.q.ar}</div>
        <div class="short-answer-wrap">
          <textarea id="ans-${q.id}" placeholder="اكتب إجابتك هنا..."></textarea>
          <div class="action-row">
            <button class="check-btn" id="chkbtn-${q.id}" onclick="checkShort(${q.id})">✔ تحقق</button>
            <button class="show-ans-btn" id="sab-${q.id}" onclick="revealShort(${q.id})"><span id="sabtxt-${q.id}">💡 اعرض الإجابة</span></button>
          </div>
        </div>
        <div class="feedback" id="fb-${q.id}"></div>
      </div>
    </div>`;
            });
        }

        // ════════════════════════════════
        // ACCORDION
        // ════════════════════════════════
        function toggleCard(id) {
            const body = document.getElementById('body-' + id);
            const hdr = body.previousElementSibling;
            const hide = !body.classList.contains('hidden');
            body.classList.toggle('hidden', hide);
            hdr.classList.toggle('collapsed', hide);
        }

        function toggleAll() {
            allCollapsed = !allCollapsed;
            for (let i = 1; i <= 12; i++) {
                const b = document.getElementById('body-' + i), h = b && b.previousElementSibling;
                if (b) { b.classList.toggle('hidden', allCollapsed); h.classList.toggle('collapsed', allCollapsed); }
            }
            const t = T[lang];
            document.getElementById('collapse-lbl').textContent = (allCollapsed ? t.expandAll : t.collapseAll).replace(/📂 /, '');
        }

        // ════════════════════════════════
        // MCQ PICK
        // ════════════════════════════════
        function pick(el, id, idx) {
            if (mcqDone[id]) return;
            const opts = document.getElementById('opts-' + id);
            opts.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            const q = MCQ.find(x => x.id === id);
            const cor = q.correctIdx;
            const t = T[lang];
            opts.querySelectorAll('.option').forEach((o, i) => { o.classList.add('disabled'); if (i === cor) o.classList.add('correct-ans'); });
            const fb = document.getElementById('fb-' + id);
            const card = document.getElementById('card-' + id);
            if (idx === cor) { el.classList.add('correct-ans'); card.classList.add('correct'); setFB(id, 'correct-fb', t.correct); mcqScore++; }
            else { el.classList.add('wrong-ans'); card.classList.add('wrong'); setFB(id, 'wrong-fb', t.wrong); }
            mcqDone[id] = true; updateProg();
        }

        // ════════════════════════════════
        // REVEAL MCQ
        // ════════════════════════════════
        function revealMCQ(id) {
            const t = T[lang];
            const sab = document.getElementById('sabtxt-' + id);
            const q = MCQ.find(x => x.id === id);
            const btn = document.getElementById('sab-' + id);
            if (revealed[id]) {
                revealed[id] = false; sab.textContent = t.showAns; btn.classList.remove('active');
                if (!mcqDone[id]) document.getElementById('opts-' + id).querySelectorAll('.option').forEach(o => o.classList.remove('correct-ans', 'disabled'));
                return;
            }
            revealed[id] = true; sab.textContent = t.hideAns; btn.classList.add('active');
            if (!mcqDone[id]) {
                const opts = document.getElementById('opts-' + id);
                opts.querySelectorAll('.option').forEach((o, i) => { if (i === q.correctIdx) o.classList.add('correct-ans'); });
            }
        }

        // ════════════════════════════════
        // SHORT CHECK
        // ════════════════════════════════
        function checkShort(id) {
            if (shortDone[id]) return;
            const ans = document.getElementById('ans-' + id).value.trim().toLowerCase();
            const q = SHORT.find(x => x.id === id);
            const t = T[lang];
            if (ans.length < 20) { setFB(id, 'wrong-fb', t.tooShort); return; }
            const ratio = q.keywords.filter(k => ans.includes(k)).length / q.keywords.length;
            shortDone[id] = true; shortScores[id] = ratio >= 0.4 ? 1 : 0;
            const model = q.model[lang] || q.model.ar;
            const card = document.getElementById('card-' + id);
            if (ratio >= 0.6) { card.classList.add('correct'); setFB(id, 'correct-fb', `${t.excellent}<br><br><strong>${t.modelLbl}</strong><pre>${model}</pre>`); }
            else if (ratio >= 0.3) { card.classList.add('wrong'); setFB(id, 'info-fb', `${t.partial}<br><br><pre>${model}</pre>`); }
            else { card.classList.add('wrong'); setFB(id, 'wrong-fb', `${t.poor}<br><br><strong>${t.modelLbl}</strong><pre>${model}</pre>`); }
            document.getElementById('ans-' + id).disabled = true;
            updateProg();
        }

        // ════════════════════════════════
        // REVEAL SHORT
        // ════════════════════════════════
        function revealShort(id) {
            const t = T[lang];
            const sab = document.getElementById('sabtxt-' + id);
            const btn = document.getElementById('sab-' + id);
            const q = SHORT.find(x => x.id === id);
            if (revealed[id]) {
                revealed[id] = false; sab.textContent = t.showAns; btn.classList.remove('active');
                if (!shortDone[id]) { const fb = document.getElementById('fb-' + id); fb.className = 'feedback'; fb.innerHTML = ''; }
                return;
            }
            revealed[id] = true; sab.textContent = t.hideAns; btn.classList.add('active');
            const model = q.model[lang] || q.model.ar;
            setFB(id, 'info-fb', `💡 <strong>${t.modelLbl}</strong><pre>${model}</pre>`);
        }

        // ════════════════════════════════
        // LANG TOGGLE
        // ════════════════════════════════
        function toggleLang() {
            lang = lang === 'ar' ? 'en' : 'ar';
            const root = document.getElementById('html-root');
            root.setAttribute('lang', lang); root.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            applyLang();
        }

        function applyLang() {
            const t = T[lang];
            // topbar
            const collLbl = document.getElementById('collapse-lbl');
            if (collLbl) collLbl.textContent = (allCollapsed ? t.expandAll : t.collapseAll).replace(/📂 /, '');
            document.getElementById('lang-lbl').textContent = t.langLbl;
            // header
            document.getElementById('hdr-h1').textContent = lang === 'ar' ? 'اختبار الـ Lab #2' : 'Lab #2 Quiz';
            // sections
            setText('sec1', t.sec1); setText('sec2', t.sec2);
            // submit
            document.getElementById('sub-lbl').textContent = t.submitBtn.replace('📊 ', '');
            setText('restart-lbl', t.restartBtn.replace('🔄 ', ''));
            // MCQ questions & options
            MCQ.forEach(q => {
                setText('prev-' + q.id, q.q[lang]);
                setText('qtxt-' + q.id, q.q[lang]);
                const opts = document.getElementById('opts-' + q.id);
                if (opts) opts.querySelectorAll('.opt-txt').forEach((el, i) => { el.textContent = q.opts[lang][i]; });
                const sabtxt = document.getElementById('sabtxt-' + q.id);
                if (sabtxt) sabtxt.textContent = revealed[q.id] ? t.hideAns : t.showAns;
            });
            // Short questions
            SHORT.forEach(q => {
                setText('prev-' + q.id, q.q[lang]);
                setText('qtxt-' + q.id, q.q[lang]);
                const ta = document.getElementById('ans-' + q.id);
                if (ta && !ta.disabled) ta.placeholder = t.placeholder;
                const chk = document.getElementById('chkbtn-' + q.id);
                if (chk) chk.textContent = t.checkBtn;
                const sabtxt = document.getElementById('sabtxt-' + q.id);
                if (sabtxt) sabtxt.textContent = revealed[q.id] ? t.hideAns : t.showAns;
                // re-render revealed model in new lang
                if (revealed[q.id] && !shortDone[q.id]) {
                    const model = q.model[lang] || q.model.ar;
                    setFB(q.id, 'info-fb', `💡 <strong>${t.modelLbl}</strong><pre>${model}</pre>`);
                }
            });
            // progress
            const done = Object.keys(mcqDone).length + Object.keys(shortDone).length;
            document.getElementById('prog-lbl').textContent = t.prog(done, TOTAL);
        }

        // ════════════════════════════════
        // HELPERS
        // ════════════════════════════════
        function setText(id, val) { const e = document.getElementById(id); if (e) e.textContent = val; }
        function setFB(id, cls, html) { const f = document.getElementById('fb-' + id); f.className = 'feedback show ' + cls; f.innerHTML = html; }
        function updateProg() {
            const done = Object.keys(mcqDone).length + Object.keys(shortDone).length;
            document.getElementById('prog-bar').style.width = Math.round(done / TOTAL * 100) + '%';
            document.getElementById('prog-lbl').textContent = T[lang].prog(done, TOTAL);
        }

        // ════════════════════════════════
        // SUBMIT
        // ════════════════════════════════
        function submitAll() {
            const tot = mcqScore + Object.values(shortScores).reduce((a, b) => a + b, 0);
            const pct = Math.round(tot / 12 * 100);
            document.getElementById('quiz-body').style.display = 'none';
            document.getElementById('score-card').style.display = 'block';
            document.getElementById('sc-circle').style.setProperty('--pct', pct + '%');
            document.getElementById('sc-num').textContent = `${tot}/12`;
            const t = T[lang];
            let ti, su;
            if (pct >= 90) { ti = t.s90; su = t.p90; } else if (pct >= 75) { ti = t.s75; su = t.p75; }
            else if (pct >= 60) { ti = t.s60; su = t.p60; } else if (pct >= 40) { ti = t.s40; su = t.p40; } else { ti = t.s0; su = t.p0; }
            document.getElementById('sc-title').textContent = ti;
            document.getElementById('sc-sub').textContent = `${pct}% — ${su}`;
            document.getElementById('prog-bar').style.width = '100%';
            document.getElementById('prog-lbl').textContent = t.progDone;
        }

        function restart() { location.reload(); }

        // ════════════════════════════════
        // INIT
        // ════════════════════════════════
        buildQuiz();
        updateProg();
    </script>
</body>

</html>
